<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matthew Chrestenson — Marketing Proposal Coordinator | MYR Group</title>

  <!-- SEO & Social Share -->
  <meta name="description" content="Portfolio of Matthew Chrestenson, Marketing Proposal Coordinator at MYR Group in Thornton, Colorado. A curated collection of web-based marketing tools, dashboards, and interactive experiences designed to elevate proposal workflows and brand storytelling.">
  <meta name="keywords" content="Matthew Chrestenson, MYR Group, Marketing Proposal Coordinator, Thornton Colorado, web design, marketing tools, dashboards, portfolio 2026">
  <meta name="author" content="Matthew Chrestenson">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Matthew Chrestenson — Current Design Work 2026">
  <meta property="og:description" content="A curated portfolio of web-based marketing tools, dashboards, and interactive experiences by Matthew Chrestenson — Marketing Proposal Coordinator at MYR Group, Thornton, Colorado.">
  <meta property="og:image" content="https://myr-matthew-chrestenson-marketing-p.vercel.app/og-image.svg">
  <meta property="og:url" content="https://myr-matthew-chrestenson-marketing-p.vercel.app">
  <meta property="og:site_name" content="Matthew Chrestenson Portfolio">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Matthew Chrestenson — Current Design Work 2026">
  <meta name="twitter:description" content="A curated portfolio of web-based marketing tools, dashboards, and interactive experiences by Matthew Chrestenson — Marketing Proposal Coordinator at MYR Group.">
  <meta name="twitter:image" content="https://myr-matthew-chrestenson-marketing-p.vercel.app/og-image.svg">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#1a1a1a">

  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

    :root {
      --bg-dark: #111111;
      --bg-mid: #1a1a1a;
      --bg-light: #242424;
      --text-primary: #f0f0f0;
      --text-secondary: #999999;
      --text-dim: #666666;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    html {
      scroll-behavior: smooth;
      overflow-x: hidden;
    }

    body {
      font-family: var(--font);
      background: var(--bg-dark);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* ── Hero ── */
    .hero {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: linear-gradient(180deg, #0d0d0d 0%, #1a1a1a 50%, #222222 100%);
      position: relative;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 1px;
      height: 80px;
      background: linear-gradient(180deg, transparent, var(--text-dim));
      animation: pulse-line 2s ease-in-out infinite;
    }

    @keyframes pulse-line {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .hero-label {
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 2rem;
      font-weight: 500;
    }

    .hero h1 {
      font-size: clamp(1.8rem, 5vw, 3.5rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }

    .hero h1 strong { font-weight: 600; }

    .hero-year {
      font-size: clamp(1rem, 2.5vw, 1.4rem);
      font-weight: 200;
      color: var(--text-secondary);
      margin-bottom: 2.5rem;
      letter-spacing: 0.1em;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      justify-content: center;
      align-items: center;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 400;
    }

    .hero-meta span { display: flex; align-items: center; gap: 0.4rem; }

    .hero-meta .dot {
      width: 3px; height: 3px; border-radius: 50%;
      background: var(--text-dim); display: none;
    }

    @media (min-width: 640px) { .hero-meta .dot { display: block; } }

    .scroll-hint {
      position: absolute;
      bottom: 2rem;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-dim);
      animation: fade-bounce 2s ease-in-out infinite;
    }

    @keyframes fade-bounce {
      0%, 100% { opacity: 0.4; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(4px); }
    }

    /* ── Project Cards ── */
    .project {
      position: relative;
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      overflow: hidden;
    }

    .project-overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      background: transparent;
      transition: background 0.4s ease;
    }

    .project:hover .project-overlay {
      background: rgba(0,0,0,0.15);
    }

    .project-header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      padding: 1.2rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(180deg, rgba(17,17,17,0.92) 0%, rgba(17,17,17,0.6) 70%, transparent 100%);
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .project:hover .project-header,
    .project.active .project-header {
      opacity: 1;
    }

    .project-header * { pointer-events: auto; }

    .project-info {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .project-number {
      font-size: 0.65rem;
      color: var(--text-dim);
      font-weight: 400;
      letter-spacing: 0.15em;
      font-variant-numeric: tabular-nums;
    }

    .project-title {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .project-cta {
      font-size: 0.6rem;
      color: var(--text-dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.4rem 0.8rem;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 2px;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .project-cta:hover {
      color: var(--text-primary);
      border-color: rgba(255,255,255,0.35);
    }

    /* Bottom label — always visible on mobile */
    .project-footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 20;
      padding: 1.5rem;
      background: linear-gradient(0deg, rgba(17,17,17,0.92) 0%, rgba(17,17,17,0.5) 70%, transparent 100%);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .project:hover .project-footer,
    .project.active .project-footer {
      opacity: 1;
    }

    .project-footer-name {
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--text-primary);
    }

    .project-footer-hint {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* Screenshot image */
    .project-screenshot {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      object-fit: cover;
      object-position: top center;
      display: block;
      background: var(--bg-mid);
    }

    /* Loading placeholder */
    .project-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-mid);
      z-index: 5;
      transition: opacity 0.6s ease;
    }

    .project-loading.loaded {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 1.5px solid var(--text-dim);
      border-top-color: var(--text-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Nav Dots ── */
    .nav-dots {
      position: fixed;
      right: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      mix-blend-mode: difference;
    }

    .nav-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.25);
      cursor: pointer;
      transition: all 0.3s ease;
      border: none; padding: 0;
    }

    .nav-dot:hover { background: rgba(255,255,255,0.6); transform: scale(1.4); }
    .nav-dot.active { background: rgba(255,255,255,0.9); transform: scale(1.3); }

    /* ── Progress Bar ── */
    .progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--text-dim), var(--text-primary));
      z-index: 200;
      transition: width 0.1s linear;
      width: 0%;
    }

    /* ── Mobile ── */
    @media (max-width: 639px) {
      .hero h1 { font-size: 1.6rem; }
      .hero-meta { flex-direction: column; gap: 0.6rem; }
      .nav-dots { right: 0.6rem; gap: 0.5rem; }
      .nav-dot { width: 5px; height: 5px; }
      .project-header { padding: 0.8rem 1rem; }
      .project-footer { opacity: 1; }
      .project-footer-name { font-size: 0.9rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      .hero::after, .scroll-hint { animation: none; }
    }
  </style>
</head>
<body>

  <div class="progress-bar" id="progressBar"></div>
  <nav class="nav-dots" id="navDots" aria-label="Section navigation"></nav>

  <!-- Hero -->
  <section class="hero" id="hero">
    <p class="hero-label">Portfolio</p>
    <h1>Current Design Work</h1>
    <h1><strong>Matthew Chrestenson</strong></h1>
    <p class="hero-year">2026</p>
    <div class="hero-meta">
      <span>Marketing Proposal Coordinator</span>
      <span class="dot"></span>
      <span>MYR Group</span>
      <span class="dot"></span>
      <span>Thornton, Colorado</span>
    </div>
    <p class="scroll-hint">Scroll to explore</p>
  </section>

  <!-- Projects -->
  <div id="projects"></div>

  <script>
    const projects = [
      { name: "SUPR Tools", url: "https://supr-tools.vercel.app/" },
      { name: "Run Rate", url: "https://run-rate.vercel.app/" },
      { name: "Atlas PCC Dashboard", url: "https://atlas-pcc-api.vercel.app/dashboard" },
      { name: "SUPR Jobsite Supervisor", url: "https://supr-jobsite-supervisor.vercel.app/" },
      { name: "Wellspring Creative Partnership", url: "https://wellspring-creative-partnership.vercel.app/questionnaire.html" },
      { name: "VO2 Reaction Cardiorespiratory", url: "https://vo-2-reaction-cardiorespiratory-fit.vercel.app/" },
      { name: "VO2 Reaction", url: "https://vo-2-reaction-7r1v.vercel.app/" },
      { name: "VUCA", url: "https://vuca-rho.vercel.app/" },
      { name: "DIY Codespring", url: "https://diy-codespring-u2yi.vercel.app/" },
      { name: "ROI Prime Reaction", url: "https://roi.primereaction.us/" },
      { name: "Prime Facility Vision", url: "https://prime-facility-vision-questionnaire.vercel.app/" },
      { name: "Prime Reaction Tracker", url: "https://prime-reaction-project-tracker.vercel.app/" },
    ];

    // Screenshot API — generates a live capture of each URL
    function screenshotUrl(url) {
      return `https://image.thum.io/get/width/1440/crop/900/noanimate/${url}`;
    }

    const container = document.getElementById("projects");
    const navDots = document.getElementById("navDots");

    // Hero dot
    const heroDot = document.createElement("button");
    heroDot.className = "nav-dot active";
    heroDot.setAttribute("aria-label", "Go to top");
    heroDot.addEventListener("click", () => {
      document.getElementById("hero").scrollIntoView({ behavior: "smooth" });
    });
    navDots.appendChild(heroDot);

    // Build project sections
    projects.forEach((project, i) => {
      const section = document.createElement("section");
      section.className = "project";
      section.id = `project-${i}`;
      section.innerHTML = `
        <div class="project-loading" id="loader-${i}">
          <div class="loading-spinner"></div>
        </div>
        <div class="project-overlay"></div>
        <div class="project-header">
          <div class="project-info">
            <span class="project-number">${String(i + 1).padStart(2, "0")} / ${String(projects.length).padStart(2, "0")}</span>
            <span class="project-title">${project.name}</span>
          </div>
          <a class="project-cta" href="${project.url}" target="_blank" rel="noopener noreferrer">
            Visit Site <span>&rarr;</span>
          </a>
        </div>
        <div class="project-footer">
          <span class="project-footer-name">${project.name}</span>
          <span class="project-footer-hint">Click to open &rarr;</span>
        </div>
      `;

      // Click anywhere on the card opens the site
      section.addEventListener("click", (e) => {
        // Don't double-fire if they clicked the CTA link
        if (e.target.closest(".project-cta")) return;
        window.open(project.url, "_blank", "noopener,noreferrer");
      });

      container.appendChild(section);

      // Nav dot
      const dot = document.createElement("button");
      dot.className = "nav-dot";
      dot.setAttribute("aria-label", `Go to ${project.name}`);
      dot.addEventListener("click", () => {
        section.scrollIntoView({ behavior: "smooth" });
      });
      navDots.appendChild(dot);
    });

    // Lazy load screenshots
    const lazyObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          const section = entry.target;
          const idx = parseInt(section.id.split("-")[1]);
          if (!section.querySelector("img")) {
            const img = document.createElement("img");
            img.className = "project-screenshot";
            img.alt = `Screenshot of ${projects[idx].name}`;
            img.loading = "lazy";
            img.src = screenshotUrl(projects[idx].url);
            img.addEventListener("load", () => {
              const loader = document.getElementById(`loader-${idx}`);
              if (loader) loader.classList.add("loaded");
            });
            // On error, show a fallback gradient
            img.addEventListener("error", () => {
              img.style.display = "none";
              const loader = document.getElementById(`loader-${idx}`);
              if (loader) {
                loader.innerHTML = `<span style="font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;color:#666">${projects[idx].name}</span>`;
              }
            });
            // Insert after loading div
            section.insertBefore(img, section.querySelector(".project-overlay"));
          }
          lazyObserver.unobserve(section);
        }
      });
    }, { rootMargin: "400px" });

    document.querySelectorAll(".project").forEach((el) => lazyObserver.observe(el));

    // Active section tracking
    const allSections = [document.getElementById("hero"), ...document.querySelectorAll(".project")];
    const allDots = document.querySelectorAll(".nav-dot");

    const sectionObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          const idx = allSections.indexOf(entry.target);
          allDots.forEach((d, di) => d.classList.toggle("active", di === idx));
          document.querySelectorAll(".project").forEach((p) => p.classList.remove("active"));
          if (entry.target.classList.contains("project")) {
            entry.target.classList.add("active");
          }
        }
      });
    }, { threshold: 0.5 });

    allSections.forEach((s) => sectionObserver.observe(s));

    // Progress bar
    window.addEventListener("scroll", () => {
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
      document.getElementById("progressBar").style.width = progress + "%";
    }, { passive: true });

    // Infinite scroll loop
    let loopCooldown = false;
    window.addEventListener("scroll", () => {
      if (loopCooldown) return;
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      if (scrollTop >= docHeight - 2) {
        loopCooldown = true;
        setTimeout(() => {
          window.scrollTo({ top: 0, behavior: "smooth" });
          setTimeout(() => { loopCooldown = false; }, 1500);
        }, 600);
      }
    }, { passive: true });

    // Keyboard navigation
    document.addEventListener("keydown", (e) => {
      const currentIdx = [...allDots].findIndex((d) => d.classList.contains("active"));
      if (e.key === "ArrowDown" || e.key === "j") {
        e.preventDefault();
        const next = Math.min(currentIdx + 1, allSections.length - 1);
        allSections[next].scrollIntoView({ behavior: "smooth" });
      } else if (e.key === "ArrowUp" || e.key === "k") {
        e.preventDefault();
        const prev = Math.max(currentIdx - 1, 0);
        allSections[prev].scrollIntoView({ behavior: "smooth" });
      }
    });
  </script>
</body>
</html>
