  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

    :root {
      --bg-dark: #111111;
      --bg-mid: #1a1a1a;
      --text-primary: #f0f0f0;
      --text-secondary: #999999;
      --text-dim: #666666;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --yellow-start: #f5c842;
      --yellow-mid: #fde68a;
      --yellow-end: #f5c842;
      --orange-start: #d4710a;
      --orange-mid: #f59e0b;
      --orange-end: #fbbf24;
      --red-start: #991b1b;
      --red-mid: #dc2626;
      --red-end: #f87171;
    }

    html { scroll-behavior: smooth; overflow-x: hidden; }

    body {
      font-family: var(--font);
      background: var(--bg-dark);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* ── Top Menu Bar ── */
    .top-menu {
      position: fixed; top: 0; left: 0; right: 0; z-index: 300;
      height: 48px;
      background: rgba(17, 17, 17, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      gap: 0.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      transform: translateY(-100%);
      transition: transform 0.4s ease;
    }

    .top-menu.visible { transform: translateY(0); }

    .top-menu-brand {
      font-size: 0.65rem; font-weight: 500; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--text-dim);
      margin-right: 1.5rem;
    }

    .top-menu-link {
      font-size: 0.6rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--text-secondary);
      text-decoration: none; padding: 0.35rem 0.8rem;
      border: 1px solid rgba(255,255,255,0.08); border-radius: 2px;
      transition: all 0.3s ease; font-weight: 500;
      display: inline-flex; align-items: center; gap: 0.35rem;
    }

    .top-menu-link:hover {
      color: var(--text-primary); border-color: rgba(255,255,255,0.3);
    }

    .top-menu-link.active[data-section="web-work"] {
      color: #111; background: var(--yellow-mid);
      border-color: var(--yellow-mid);
    }

    .top-menu-link.active[data-section="video-work"] {
      color: #111; background: var(--orange-end);
      border-color: var(--orange-end);
    }

    .top-menu-link.active[data-section="presentations"] {
      color: #fff; background: var(--red-mid);
      border-color: var(--red-mid);
    }

    .top-menu-divider {
      width: 1px; height: 18px;
      background: rgba(255,255,255,0.08); margin: 0 0.3rem;
    }

    /* ── Hero ── */
    .hero {
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
      background: linear-gradient(180deg, #0d0d0d 0%, #1a1a1a 50%, #222222 100%);
      position: relative;
    }

    .hero::after {
      content: ''; position: absolute; bottom: 0; left: 50%;
      transform: translateX(-50%); width: 1px; height: 80px;
      background: linear-gradient(180deg, transparent, var(--text-dim));
      animation: pulse-line 2s ease-in-out infinite;
    }

    @keyframes pulse-line { 0%,100%{opacity:.3} 50%{opacity:1} }

    .hero-label {
      font-size: 0.7rem; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--text-dim);
      margin-bottom: 2rem; font-weight: 500;
    }

    .hero h1 {
      font-size: clamp(1.8rem, 5vw, 3.5rem); font-weight: 300;
      letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.5rem;
    }

    .hero h1 strong { font-weight: 600; }

    .hero-year {
      font-size: clamp(1rem, 2.5vw, 1.4rem); font-weight: 200;
      color: var(--text-secondary); margin-bottom: 2.5rem; letter-spacing: 0.1em;
    }

    .hero-meta {
      display: flex; flex-wrap: wrap; gap: 1.5rem;
      justify-content: center; align-items: center;
      font-size: 0.75rem; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--text-dim); font-weight: 400;
    }

    .hero-meta span { display: flex; align-items: center; gap: 0.4rem; }
    .hero-meta .dot { width:3px;height:3px;border-radius:50%;background:var(--text-dim);display:none }
    @media(min-width:640px){.hero-meta .dot{display:block}}

    .scroll-hint {
      position: absolute; bottom: 2rem; font-size: 0.65rem;
      letter-spacing: 0.3em; text-transform: uppercase; color: var(--text-dim);
      animation: fade-bounce 2s ease-in-out infinite;
    }

    @keyframes fade-bounce {
      0%,100%{opacity:.4;transform:translateY(0)} 50%{opacity:1;transform:translateY(4px)}
    }

    /* ── Section Headers ── */
    .section-header {
      width: 100%; padding: 4rem 2rem;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      background: linear-gradient(180deg, #0d0d0d 0%, #181818 50%, #111 100%);
      position: relative;
    }

    .section-header-label {
      font-size: 0.6rem; letter-spacing: 0.4em;
      text-transform: uppercase; color: var(--text-dim);
      margin-bottom: 1rem; font-weight: 400;
    }

    .section-header-title {
      font-size: clamp(1.4rem, 4vw, 2.5rem); font-weight: 200;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-primary);
    }

    .section-header-count {
      margin-top: 0.8rem; font-size: 0.65rem;
      letter-spacing: 0.2em; color: var(--text-dim);
    }

    .section-header-line {
      margin-top: 1.5rem; width: 40px; height: 2px;
      border-radius: 1px;
    }

    .section-header.section-yellow .section-header-line {
      background: linear-gradient(90deg, var(--yellow-start), var(--yellow-mid), var(--yellow-end));
    }
    .section-header.section-orange .section-header-line {
      background: linear-gradient(90deg, var(--orange-start), var(--orange-mid), var(--orange-end));
    }
    .section-header.section-red .section-header-line {
      background: linear-gradient(90deg, var(--red-start), var(--red-mid), var(--red-end));
    }

    .section-header.section-yellow .section-header-title { color: var(--yellow-mid); }
    .section-header.section-orange .section-header-title { color: var(--orange-end); }
    .section-header.section-red .section-header-title { color: var(--red-end); }

    /* ── Project Sections ── */
    .project {
      position: relative; width: 100%;
      height: 100vh; height: 100dvh;
      overflow: hidden; cursor: pointer;
    }

    /* Color tint overlays */
    .project-tint {
      position: absolute; inset: 0; z-index: 1;
      pointer-events: none;
      mix-blend-mode: multiply;
    }

    .project-tint.tint-yellow { background: rgba(245, 200, 66, 1); transition: opacity 0.4s ease; }
    .project-tint.tint-orange { background: rgba(245, 158, 11, 1); transition: opacity 0.4s ease; }
    .project-tint.tint-red { background: rgba(220, 38, 38, 1); transition: opacity 0.4s ease; }

    .project:hover .project-tint { opacity: 0; }

    /* Click-capture overlay */
    .project-overlay {
      position: absolute; inset: 0; z-index: 10;
      background: transparent; transition: background 0.4s ease;
    }

    .project:hover .project-overlay {
      background: transparent;
    }

    /* Iframe */
    .project iframe {
      width: 100%; height: 100%;
      border: none; display: block;
      background: var(--bg-mid);
      pointer-events: none;
    }

    .project.video-section iframe {
      pointer-events: auto;
    }
    .project.video-section .project-overlay {
      display: none;
    }
    .project.video-section .project-header {
      opacity: 1; pointer-events: none;
    }
    .project.video-section .project-header * {
      pointer-events: auto;
    }

    /* Header bar */
    .project-header {
      position: absolute; top: 0; left: 0; right: 0; z-index: 20;
      padding: 1.2rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(180deg, rgba(17,17,17,0.92) 0%, rgba(17,17,17,0.6) 70%, transparent 100%);
      opacity: 0; transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .project:hover .project-header,
    .project.active .project-header { opacity: 1; }
    .project-header * { pointer-events: auto; }

    .project-info { display: flex; align-items: center; gap: 0.8rem; }

    .project-number {
      font-size: 0.65rem; color: var(--text-dim); font-weight: 400;
      letter-spacing: 0.15em; font-variant-numeric: tabular-nums;
    }

    .project-title {
      font-size: 0.7rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--text-secondary); font-weight: 500;
    }

    .project-cta {
      font-size: 0.6rem; color: var(--text-dim); letter-spacing: 0.15em;
      text-transform: uppercase; padding: 0.4rem 0.8rem;
      border: 1px solid rgba(255,255,255,0.12); border-radius: 2px;
      transition: all 0.3s ease; text-decoration: none;
      display: inline-flex; align-items: center; gap: 0.4rem;
    }

    .project-cta:hover {
      color: var(--text-primary); border-color: rgba(255,255,255,0.35);
    }

    /* Fallback card for sites that block iframes */
    .project-card {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(165deg, #141414 0%, #1e1e1e 40%, #191919 100%);
      gap: 1.2rem; z-index: 1;
    }

    .project-card-number {
      font-size: clamp(5rem, 12vw, 9rem); font-weight: 100;
      color: rgba(255,255,255,0.04); line-height: 1;
      letter-spacing: -0.04em;
    }

    .project-card-name {
      font-size: clamp(0.9rem, 2vw, 1.3rem); font-weight: 300;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--text-secondary); text-align: center; padding: 0 2rem;
    }

    .project-card-url {
      font-size: 0.65rem; letter-spacing: 0.08em;
      color: var(--text-dim); font-weight: 300;
    }

    .project-card-btn {
      margin-top: 1rem; font-size: 0.65rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--text-dim);
      border: 1px solid rgba(255,255,255,0.1); padding: 0.6rem 1.5rem;
      border-radius: 2px; transition: all 0.3s ease; cursor: pointer;
      background: none; font-family: var(--font);
    }

    .project-card-btn:hover {
      color: var(--text-primary); border-color: rgba(255,255,255,0.3);
    }

    /* ── Yellow Gradient Info Bar ── */
    .project-bar {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
      height: 56px;
      background: linear-gradient(90deg, #c9a227 0%, #f5d653 25%, #fde68a 50%, #f5d653 75%, #c9a227 100%);
      display: flex; align-items: center; justify-content: center;
      gap: 1.5rem;
      border-top: none;
      box-shadow: 0 -4px 20px rgba(245, 198, 66, 0.15);
    }

    .project-bar-number {
      font-size: 0.6rem; color: rgba(0,0,0,0.5); font-weight: 600;
      letter-spacing: 0.15em; font-variant-numeric: tabular-nums;
    }

    .project-bar-divider {
      width: 1px; height: 16px;
      background: rgba(0,0,0,0.15);
    }

    .project-bar-name {
      font-size: 0.75rem; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: #111111;
    }

    .project-bar-hint {
      font-size: 0.55rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: rgba(0,0,0,0.45);
      font-weight: 500;
    }

    /* ── Orange Gradient Bar (Video) ── */
    .project-bar.bar-orange {
      background: linear-gradient(90deg, #b45309 0%, #d97706 25%, #f59e0b 50%, #d97706 75%, #b45309 100%);
      box-shadow: 0 -4px 20px rgba(245, 158, 11, 0.15);
    }

    /* ── Red Gradient Bar (Presentations) ── */
    .project-bar.bar-red {
      background: linear-gradient(90deg, #991b1b 0%, #dc2626 25%, #f87171 50%, #dc2626 75%, #991b1b 100%);
      box-shadow: 0 -4px 20px rgba(220, 38, 38, 0.15);
    }

    .project-bar.bar-red .project-bar-name,
    .project-bar.bar-red .project-bar-number,
    .project-bar.bar-red .project-bar-hint { color: #fff; }
    .project-bar.bar-red .project-bar-number { color: rgba(255,255,255,0.7); }
    .project-bar.bar-red .project-bar-hint { color: rgba(255,255,255,0.6); }
    .project-bar.bar-red .project-bar-divider { background: rgba(255,255,255,0.25); }

    /* ── Nav Dots ── */
    .nav-dots {
      position: fixed; right: 1.2rem; top: 50%;
      transform: translateY(-50%); z-index: 100;
      display: flex; flex-direction: column; gap: 0.6rem;
      mix-blend-mode: difference;
    }

    .nav-dot {
      width:6px;height:6px;border-radius:50%;
      background:rgba(255,255,255,0.25);cursor:pointer;
      transition:all .3s ease;border:none;padding:0;
    }

    .nav-dot:hover{background:rgba(255,255,255,0.6);transform:scale(1.4)}
    .nav-dot.active{background:rgba(255,255,255,0.9);transform:scale(1.3)}

    /* ── Progress Bar ── */
    .progress-bar {
      position:fixed;top:0;left:0;height:2px;
      background:linear-gradient(90deg, #fde68a 0%, #f59e0b 50%, #dc2626 100%);
      z-index:400;transition:width .1s linear;width:0%;
    }

    /* ── Back to Top ── */
    .back-to-top {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 200;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--text-secondary);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.3s ease;
      opacity: 0; pointer-events: none;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .back-to-top.visible { opacity: 1; pointer-events: auto; }

    .back-to-top:hover {
      background: rgba(255,255,255,0.2);
      border-color: rgba(255,255,255,0.35);
      color: var(--text-primary);
      transform: translateY(-2px);
    }

    .back-to-top svg { width: 18px; height: 18px; }

    /* ── Footer ── */
    .footer {
      padding: 3rem 2rem; text-align: center;
      background: #0d0d0d;
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    .footer-text {
      font-size: 0.6rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--text-dim);
    }

    /* ── Mobile ── */
    @media(max-width:639px){
      .hero h1{font-size:1.6rem}
      .hero-meta{flex-direction:column;gap:.6rem}
      .nav-dots{right:.6rem;gap:.5rem}
      .nav-dot{width:5px;height:5px}
      .project-header{padding:.8rem 1rem}
      .project-bar{height:48px;gap:1rem}
      .project-bar-name{font-size:.65rem;letter-spacing:.15em}
      .top-menu{gap:0.3rem}
      .top-menu-brand{display:none}
      .top-menu-link{font-size:0.55rem;padding:0.3rem 0.6rem;letter-spacing:0.12em}
      .section-header{padding:3rem 1.5rem}
    }

    @media(prefers-reduced-motion:reduce){
      html{scroll-behavior:auto}
      .hero::after,.scroll-hint{animation:none}
    }
  </style>
</head>
<body>

  <div class="progress-bar" id="progressBar"></div>

  <!-- Top Menu Bar -->
  <nav class="top-menu" id="topMenu">
    <span class="top-menu-brand">MC Portfolio</span>
    <a href="#web-work" class="top-menu-link" data-section="web-work">Web Work</a>
    <span class="top-menu-divider"></span>
    <a href="#video-work" class="top-menu-link" data-section="video-work">Video</a>
    <span class="top-menu-divider"></span>
    <a href="#presentations" class="top-menu-link" data-section="presentations">Presentations</a>
  </nav>

  <nav class="nav-dots" id="navDots" aria-label="Section navigation"></nav>

  <!-- Back to Top -->
  <button class="back-to-top" id="backToTop" aria-label="Back to top">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7"/>
    </svg>
  </button>

  <!-- Hero -->
  <section class="hero" id="hero">
    <p class="hero-label">Portfolio</p>
    <h1>Current Work</h1>
    <h1><strong>Matthew Chrestenson</strong></h1>
    <p class="hero-year">2026</p>
    <div class="hero-meta">
      <span>Marketing Proposal Coordinator</span>
      <span class="dot"></span>
      <span>MYR Group</span>
      <span class="dot"></span>
      <span>Thornton, Colorado</span>
    </div>
    <p class="scroll-hint">Scroll to explore</p>
  </section>

  <!-- Web Work Section Header -->
  <section class="section-header section-yellow" id="web-work">
    <span class="section-header-label">Section 01</span>
    <h2 class="section-header-title">Web Work</h2>
    <span class="section-header-count" id="webWorkCount"></span>
    <div class="section-header-line"></div>
  </section>

  <div id="projects"></div>

  <!-- Video Work Section -->
  <section class="section-header section-orange" id="video-work">
    <span class="section-header-label">Section 02</span>
    <h2 class="section-header-title">Video</h2>
    <span class="section-header-count" id="videoCount"></span>
    <div class="section-header-line"></div>
  </section>

  <div id="videos"></div>

  <!-- Presentations Section -->
  <section class="section-header section-red" id="presentations">
    <span class="section-header-label">Section 03</span>
    <h2 class="section-header-title">Presentations</h2>
    <span class="section-header-count" id="presentationCount"></span>
    <div class="section-header-line"></div>
  </section>

  <div id="presentation-items"></div>

  <!-- Footer -->
  <footer class="footer">
    <p class="footer-text">Matthew Chrestenson &mdash; MYR Group &mdash; 2026</p>
  </footer>

  <script>
    const projects = [
      { name: "SUPR Tools", url: "https://supr-tools.vercel.app/" },
      { name: "Run Rate", url: "https://run-rate.vercel.app/" },
      { name: "Atlas PCC Dashboard", url: "https://atlas-pcc-api.vercel.app/dashboard" },
      { name: "SUPR Jobsite Supervisor", url: "https://supr-jobsite-supervisor.vercel.app/" },
      { name: "Wellspring Creative Partnership", url: "https://wellspring-creative-partnership.vercel.app/questionnaire.html" },
      { name: "VO2 Reaction Cardiorespiratory", url: "https://vo-2-reaction-cardiorespiratory-fit.vercel.app/" },
      { name: "VO2 Reaction", url: "https://vo-2-reaction-7r1v.vercel.app/" },
      { name: "VUCA", url: "https://vuca-rho.vercel.app/" },
      { name: "Prime Valley Ranch", url: "https://www.primevalleyranch.com/" },
      { name: "ROI Prime Reaction", url: "https://roi.primereaction.us/" },
      { name: "Prime Facility Vision", url: "https://prime-facility-vision-questionnaire.vercel.app/" },
      { name: "Prime Reaction Tracker", url: "https://prime-reaction-project-tracker.vercel.app/" },
      { name: "Not Fat Free", url: "https://www.notfatfree.com/" },
      { name: "Salesman Toolkit", url: "https://salesman-toolkit.vercel.app/" },
    ];

    const videos = [
      { name: "REAXCORE : COR-X", id: "jk1HvfuEdQg" },
      { name: "REAXTION — Sculpting the Apex Human", id: "Z-oCI4fgXaE" },
      { name: "American Gaucho — Fire, Flavor and Freedom", id: "bRqUW6SlVAo" },
      { name: "Seala Kitchen and Bath", id: "03Y21bR3HAA" },
      { name: "The Gate Is Open — A Pilgrimage Across the Stars", id: "Cl5qBOxF9bA" },
    ];

    const presentations = [
      { name: "Presentations.ai Deck", embedUrl: "https://app.presentations.ai/view/8CQXVcms7d", type: "embed" },
      { name: "Briotix Costco Presentation", id: "BAzL6b1WaDY", type: "youtube" },
      { name: "Briotix PPE Training", id: "CEq9fcqbs8I", type: "youtube" },
    ];

    const total = String(projects.length).padStart(2, "0");
    const videoTotal = String(videos.length).padStart(2, "0");
    const presentationTotal = String(presentations.length).padStart(2, "0");
    const container = document.getElementById("projects");
    const videoContainer = document.getElementById("videos");
    const presentationContainer = document.getElementById("presentation-items");
    const navDots = document.getElementById("navDots");
    const topMenu = document.getElementById("topMenu");

    // Set counts
    document.getElementById("webWorkCount").textContent = projects.length + " Projects";
    document.getElementById("videoCount").textContent = videos.length + " Videos";
    document.getElementById("presentationCount").textContent = presentations.length + (presentations.length === 1 ? " Presentation" : " Presentations");

    // Hero dot
    const heroDot = document.createElement("button");
    heroDot.className = "nav-dot active";
    heroDot.setAttribute("aria-label", "Go to top");
    heroDot.addEventListener("click", () => {
      document.getElementById("hero").scrollIntoView({ behavior: "smooth" });
    });
    navDots.appendChild(heroDot);

    // ── Build Web Project Sections ──
    projects.forEach((project, i) => {
      const section = document.createElement("section");
      section.className = "project";
      section.id = `project-${i}`;
      section.dataset.projectIdx = i;
      section.innerHTML = `
        <div class="project-tint tint-yellow"></div>
        <div class="project-overlay"></div>
        <div class="project-header">
          <div class="project-info">
            <span class="project-number">${String(i + 1).padStart(2, "0")} / ${total}</span>
            <span class="project-title">${project.name}</span>
          </div>
          <a class="project-cta" href="${project.url}" target="_blank" rel="noopener noreferrer">
            Visit Site <span>&rarr;</span>
          </a>
        </div>
        <div class="project-bar">
          <span class="project-bar-number">${String(i + 1).padStart(2, "0")} / ${total}</span>
          <span class="project-bar-divider"></span>
          <span class="project-bar-name">${project.name}</span>
          <span class="project-bar-divider"></span>
          <span class="project-bar-hint">Click to open &rarr;</span>
        </div>
      `;

      section.querySelector(".project-overlay").addEventListener("click", () => {
        window.open(project.url, "_blank", "noopener,noreferrer");
      });

      container.appendChild(section);

      const dot = document.createElement("button");
      dot.className = "nav-dot";
      dot.setAttribute("aria-label", `Go to ${project.name}`);
      dot.addEventListener("click", () => {
        section.scrollIntoView({ behavior: "smooth" });
      });
      navDots.appendChild(dot);
    });

    // Lazy-load iframes
    function attachIframe(section) {
      const idx = parseInt(section.dataset.projectIdx);
      if (isNaN(idx)) return;
      const project = projects[idx];

      if (project.noIframe) {
        if (section.querySelector(".project-card")) return;
        const shortUrl = project.url.replace(/^https?:\/\//, '').replace(/\/$/, '');
        const card = document.createElement("div");
        card.className = "project-card";
        card.innerHTML = `
          <span class="project-card-number">${String(idx + 1).padStart(2, "0")}</span>
          <span class="project-card-name">${project.name}</span>
          <span class="project-card-url">${shortUrl}</span>
          <button class="project-card-btn" onclick="window.open('${project.url}','_blank','noopener,noreferrer')">View Live Site &rarr;</button>
        `;
        section.insertBefore(card, section.firstChild);
        return;
      }

      if (section.querySelector("iframe")) return;
      const iframe = document.createElement("iframe");
      iframe.src = project.url;
      iframe.title = project.name;
      iframe.loading = "lazy";
      iframe.setAttribute("tabindex", "-1");
      iframe.setAttribute("aria-hidden", "true");
      section.insertBefore(iframe, section.firstChild);
    }

    const lazyObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          attachIframe(entry.target);
          lazyObserver.unobserve(entry.target);
        }
      });
    }, { rootMargin: "300px" });

    document.querySelectorAll(".project").forEach((el) => {
      el.dataset.observed = "1";
      lazyObserver.observe(el);
    });

    // ── Build Video Sections ──
    videos.forEach((video, i) => {
      const section = document.createElement("section");
      section.className = "project video-section";
      section.id = `video-${i}`;
      const embedUrl = `https://www.youtube.com/embed/${video.id}?rel=0&modestbranding=1&color=white`;
      const watchUrl = `https://www.youtube.com/watch?v=${video.id}`;
      section.innerHTML = `
        <div class="project-tint tint-orange"></div>
        <iframe
          src="${embedUrl}"
          title="${video.name}"
          loading="lazy"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen
          style="pointer-events:auto"
        ></iframe>
        <div class="project-header">
          <div class="project-info">
            <span class="project-number">${String(i + 1).padStart(2, "0")} / ${videoTotal}</span>
            <span class="project-title">${video.name}</span>
          </div>
          <a class="project-cta" href="${watchUrl}" target="_blank" rel="noopener noreferrer">
            Watch on YouTube <span>&rarr;</span>
          </a>
        </div>
        <div class="project-bar bar-orange">
          <span class="project-bar-number">${String(i + 1).padStart(2, "0")} / ${videoTotal}</span>
          <span class="project-bar-divider"></span>
          <span class="project-bar-name">${video.name}</span>
          <span class="project-bar-divider"></span>
          <span class="project-bar-hint">Watch on YouTube &rarr;</span>
        </div>
      `;
      videoContainer.appendChild(section);
    });

    // ── Build Presentation Sections ──
    presentations.forEach((pres, i) => {
      const section = document.createElement("section");
      section.className = "project video-section";
      section.id = `presentation-${i}`;

      let iframeSrc, linkUrl, linkText;
      if (pres.type === "youtube") {
        iframeSrc = `https://www.youtube.com/embed/${pres.id}?rel=0&modestbranding=1&color=white`;
        linkUrl = `https://www.youtube.com/watch?v=${pres.id}`;
        linkText = "Watch on YouTube";
      } else {
        iframeSrc = pres.embedUrl;
        linkUrl = pres.embedUrl;
        linkText = "View Full Screen";
      }

      section.innerHTML = `
        <div class="project-tint tint-red"></div>
        <iframe
          src="${iframeSrc}"
          title="${pres.name}"
          loading="lazy"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen="true"
          scrolling="no"
          style="pointer-events:auto"
        ></iframe>
        <div class="project-header">
          <div class="project-info">
            <span class="project-number">${String(i + 1).padStart(2, "0")} / ${presentationTotal}</span>
            <span class="project-title">${pres.name}</span>
          </div>
          <a class="project-cta" href="${linkUrl}" target="_blank" rel="noopener noreferrer">
            ${linkText} <span>&rarr;</span>
          </a>
        </div>
        <div class="project-bar bar-red">
          <span class="project-bar-number">${String(i + 1).padStart(2, "0")} / ${presentationTotal}</span>
          <span class="project-bar-divider"></span>
          <span class="project-bar-name">${pres.name}</span>
          <span class="project-bar-divider"></span>
          <span class="project-bar-hint">${linkText} &rarr;</span>
        </div>
      `;
      presentationContainer.appendChild(section);
    });

    // ── UI Controls ──
    const heroEl = document.getElementById("hero");
    const backToTop = document.getElementById("backToTop");

    backToTop.addEventListener("click", () => {
      heroEl.scrollIntoView({ behavior: "smooth" });
    });

    function updateTopMenu() {
      const heroBottom = heroEl.getBoundingClientRect().bottom;
      const pastHero = heroBottom < 0;
      topMenu.classList.toggle("visible", pastHero);
      backToTop.classList.toggle("visible", pastHero);
    }

    function updateMenuLinks() {
      const links = topMenu.querySelectorAll(".top-menu-link");
      const sections = ["web-work", "video-work", "presentations"];
      const scrollY = window.scrollY + window.innerHeight / 3;

      let activeSection = null;
      for (let i = sections.length - 1; i >= 0; i--) {
        const el = document.getElementById(sections[i]);
        if (el && el.offsetTop <= scrollY) {
          activeSection = sections[i];
          break;
        }
      }

      links.forEach((link) => {
        link.classList.toggle("active", link.dataset.section === activeSection);
      });
    }

    function updateActiveDot() {
      const viewMid = window.innerHeight / 2;
      const allDots = document.querySelectorAll(".nav-dot");

      const heroRect = heroEl.getBoundingClientRect();
      if (heroRect.top <= viewMid && heroRect.bottom > viewMid) {
        allDots.forEach((d, i) => d.classList.toggle("active", i === 0));
        document.querySelectorAll(".project").forEach((p) => p.classList.remove("active"));
        return;
      }

      const visibleProjects = document.querySelectorAll(".project");
      visibleProjects.forEach((p) => p.classList.remove("active"));

      for (const p of visibleProjects) {
        const r = p.getBoundingClientRect();
        if (r.top <= viewMid && r.bottom > viewMid) {
          p.classList.add("active");
          const idx = parseInt(p.dataset.projectIdx);
          allDots.forEach((d, di) => d.classList.toggle("active", di === idx + 1));
          break;
        }
      }
    }

    window.addEventListener("scroll", () => {
      updateActiveDot();
      updateTopMenu();
      updateMenuLinks();
    }, { passive: true });

    // Progress bar
    window.addEventListener("scroll", () => {
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
      document.getElementById("progressBar").style.width = progress + "%";
    }, { passive: true });

    // Smooth scroll for menu links
    topMenu.querySelectorAll(".top-menu-link").forEach((link) => {
      link.addEventListener("click", (e) => {
        e.preventDefault();
        const target = document.getElementById(link.dataset.section);
        if (target) target.scrollIntoView({ behavior: "smooth" });
      });
    });

    // Keyboard navigation
    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowDown" || e.key === "j") {
        e.preventDefault();
        window.scrollBy({ top: window.innerHeight, behavior: "smooth" });
      } else if (e.key === "ArrowUp" || e.key === "k") {
        e.preventDefault();
        window.scrollBy({ top: -window.innerHeight, behavior: "smooth" });
      }
    });
  </script>
</body>
</html>
