<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matthew Chrestenson — Marketing Proposal Coordinator | MYR Group</title>

  <meta name="description" content="Portfolio of Matthew Chrestenson, Marketing Proposal Coordinator at MYR Group in Thornton, Colorado.">
  <meta name="keywords" content="Matthew Chrestenson, MYR Group, Marketing Proposal Coordinator, Thornton Colorado, web design, marketing tools, dashboards, portfolio 2026">
  <meta name="author" content="Matthew Chrestenson">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Matthew Chrestenson — Current Work 2026">
  <meta property="og:description" content="A curated portfolio of web-based marketing tools, dashboards, and interactive experiences by Matthew Chrestenson — Marketing Proposal Coordinator at MYR Group, Thornton, Colorado.">
  <meta property="og:image" content="https://myr-matthew-chrestenson-marketing-p.vercel.app/og-image.svg">
  <meta property="og:url" content="https://myr-matthew-chrestenson-marketing-p.vercel.app">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Matthew Chrestenson — Current Work 2026">
  <meta name="twitter:image" content="https://myr-matthew-chrestenson-marketing-p.vercel.app/og-image.svg">

  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="theme-color" content="#1a1a1a">

  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

    :root {
      --bg-dark: #111111;
      --text-primary: #f0f0f0;
      --text-secondary: #999999;
      --text-dim: #666666;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    html { scroll-behavior: smooth; overflow-x: hidden; }

    body {
      font-family: var(--font);
      background: var(--bg-dark);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Top Menu ── */
    .top-menu {
      position: fixed; top: 0; left: 0; right: 0; z-index: 300;
      height: 48px;
      background: rgba(17,17,17,0.92);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      transform: translateY(0);
    }
    .top-menu-brand {
      font-size: 0.65rem; font-weight: 500; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--text-dim); margin-right: 1.5rem;
    }
    .top-menu-link {
      font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--text-secondary); text-decoration: none; padding: 0.35rem 0.8rem;
      border: 1px solid rgba(255,255,255,0.08); border-radius: 2px;
      transition: all 0.3s ease; font-weight: 500;
    }
    .top-menu-link:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.3); }
    .top-menu-link.active[data-section="web-work"] { color:#111; background:#fde68a; border-color:#fde68a; }
    .top-menu-link.active[data-section="video-work"] { color:#111; background:#fbbf24; border-color:#fbbf24; }
    .top-menu-link.active[data-section="presentations"] { color:#fff; background:#dc2626; border-color:#dc2626; }
    .top-menu-divider { width:1px; height:18px; background:rgba(255,255,255,0.08); margin:0 0.3rem; }

    /* ── Hero ── */
    .hero {
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
      background: linear-gradient(180deg, #0d0d0d 0%, #1a1a1a 50%, #222 100%);
      position: relative;
    }
    .hero::after {
      content:''; position:absolute; bottom:0; left:50%;
      transform:translateX(-50%); width:1px; height:80px;
      background:linear-gradient(180deg,transparent,var(--text-dim));
      animation:pulse-line 2s ease-in-out infinite;
    }
    @keyframes pulse-line{0%,100%{opacity:.3}50%{opacity:1}}
    .hero-label { font-size:.7rem; letter-spacing:.35em; text-transform:uppercase; color:var(--text-dim); margin-bottom:2rem; font-weight:500; }
    .hero h1 { font-size:clamp(1.8rem,5vw,3.5rem); font-weight:300; letter-spacing:-0.02em; line-height:1.2; margin-bottom:0.5rem; }
    .hero h1 strong { font-weight:600; }
    .hero-year { font-size:clamp(1rem,2.5vw,1.4rem); font-weight:200; color:var(--text-secondary); margin-bottom:2.5rem; letter-spacing:0.1em; }
    .hero-meta { display:flex; flex-wrap:wrap; gap:1.5rem; justify-content:center; font-size:.75rem; letter-spacing:.15em; text-transform:uppercase; color:var(--text-dim); }
    .hero-meta span { display:flex; align-items:center; gap:0.4rem; }
    .hero-meta .dot { width:3px;height:3px;border-radius:50%;background:var(--text-dim);display:none }
    @media(min-width:640px){.hero-meta .dot{display:block}}
    .scroll-hint { position:absolute; bottom:2rem; font-size:.65rem; letter-spacing:.3em; text-transform:uppercase; color:var(--text-dim); animation:fade-bounce 2s ease-in-out infinite; }
    @keyframes fade-bounce{0%,100%{opacity:.4;transform:translateY(0)}50%{opacity:1;transform:translateY(4px)}}

    /* ── Bento Section (full page) ── */
    .bento-page {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      position: relative;
    }

    .bento-item {
      position: relative; overflow: hidden; cursor: pointer;
    }

    .bento-item iframe {
      width: 100%; height: 100%; border: none; display: block;
      background: #1a1a1a; pointer-events: none;
    }

    .bento-item.interactive iframe { pointer-events: auto; }

    /* Color tint overlay */
    .bento-tint {
      position: absolute; inset: 0; z-index: 2;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    /* tint gradients applied per-item via JS */

    .bento-item:hover .bento-tint { opacity: 0; }
    .bento-item.revealed .bento-tint { opacity: 0; }

    /* Label on each bento cell */
    .bento-label {
      position: absolute; inset: 0; z-index: 3;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 1rem;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .bento-item:hover .bento-label { opacity: 0; }
    .bento-item.revealed .bento-label { opacity: 0; }

    .bento-label-name {
      font-size: clamp(0.65rem, 1.2vw, 1rem); font-weight: 500;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--text-primary); line-height: 1.3;
    }
    .bento-label-num {
      font-size: 0.55rem; font-weight: 400;
      letter-spacing: 0.15em; color: var(--text-dim);
      margin-top: 0.3rem;
    }

    /* Click overlay for web projects */
    .bento-click {
      position: absolute; inset: 0; z-index: 5;
      background: transparent; cursor: pointer;
    }
    .bento-item:hover .bento-click { background: transparent; }

    /* Section title bar */
    .bento-section-title {
      width: 100%; padding: 0.6rem 1.2rem;
      font-size: 0.6rem; font-weight: 500;
      letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--text-dim); background: var(--bg-dark);
      text-align: center;
    }
    .bento-section-title.light { color: rgba(255,255,255,0.7); }

    /* ── Back to Top ── */
    .back-to-top {
      position:fixed; bottom:1.5rem; right:1.5rem; z-index:200;
      width:40px; height:40px; border-radius:50%;
      background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.15);
      color:var(--text-secondary);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:all .3s ease;
      opacity:0; pointer-events:none;
      backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    }
    .back-to-top.visible{opacity:1;pointer-events:auto}
    .back-to-top:hover{background:rgba(255,255,255,0.2);border-color:rgba(255,255,255,0.35);color:var(--text-primary);transform:translateY(-2px)}
    .back-to-top svg{width:18px;height:18px}

    /* ── Progress Bar ── */
    .progress-bar {
      position:fixed;top:0;left:0;height:2px;
      background:linear-gradient(90deg,#fde68a 0%,#f59e0b 50%,#dc2626 100%);
      z-index:400;transition:width .1s linear;width:0%;
    }

    /* ── Footer ── */
    .footer { padding:3rem 2rem; text-align:center; background:#0d0d0d; border-top:1px solid rgba(255,255,255,0.04); }
    .footer-text { font-size:.6rem; letter-spacing:.2em; text-transform:uppercase; color:var(--text-dim); }

    /* ── Mobile ── */
    @media(max-width:639px){
      .hero h1{font-size:1.6rem}
      .hero-meta{flex-direction:column;gap:.6rem}
      .top-menu{gap:0.3rem}
      .top-menu-brand{display:none}
      .top-menu-link{font-size:0.5rem;padding:0.25rem 0.5rem;letter-spacing:0.1em}
      .bento-item{min-height:30vh}
      .bento-label-name{font-size:0.6rem}
      .back-to-top{width:36px;height:36px;bottom:1rem;right:1rem}
    }

    @media(prefers-reduced-motion:reduce){
      html{scroll-behavior:auto}
      .hero::after,.scroll-hint{animation:none}
    }
  </style>
</head>
<body>

  <div class="progress-bar" id="progressBar"></div>

  <nav class="top-menu" id="topMenu">
    <a href="#hero" class="top-menu-brand" style="text-decoration:none;cursor:pointer">MC Portfolio</a>
    <a href="#web-work" class="top-menu-link" data-section="web-work">Web Work</a>
    <span class="top-menu-divider"></span>
    <a href="#video-work" class="top-menu-link" data-section="video-work">Video</a>
    <span class="top-menu-divider"></span>
    <a href="#presentations" class="top-menu-link" data-section="presentations">Presentations</a>
  </nav>

  <button class="back-to-top" id="backToTop" aria-label="Back to top">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7"/>
    </svg>
  </button>

  <!-- Hero -->
  <section class="hero" id="hero">
    <p class="hero-label">Portfolio</p>
    <h1>Current Work</h1>
    <h1><strong>Matthew Chrestenson</strong></h1>
    <p class="hero-year">2026</p>
    <div class="hero-meta">
      <span>Marketing Proposal Coordinator</span>
      <span class="dot"></span>
      <span>MYR Group</span>
      <span class="dot"></span>
      <span>Thornton, Colorado</span>
    </div>
    <p class="scroll-hint">Scroll to explore</p>
  </section>

  <!-- Web Work Bento -->
  <div class="bento-section-title">Web Work</div>
  <div class="bento-page" id="web-work"></div>

  <!-- Video Bento -->
  <div class="bento-section-title">Video</div>
  <div class="bento-page" id="video-work"></div>

  <!-- Presentations Bento -->
  <div class="bento-section-title light">Presentations</div>
  <div class="bento-page" id="presentations"></div>

  <footer class="footer">
    <p class="footer-text">Matthew Chrestenson &mdash; MYR Group &mdash; 2026</p>
  </footer>

  <script>
    const projects = [
      { name: "SUPR Tools", url: "https://supr-tools.vercel.app/" },
      { name: "Run Rate", url: "https://run-rate.vercel.app/" },
      { name: "Atlas PCC Dashboard", url: "https://atlas-pcc-api.vercel.app/dashboard" },
      { name: "SUPR Jobsite Supervisor", url: "https://supr-jobsite-supervisor.vercel.app/" },
      { name: "Wellspring Creative Partnership", url: "https://wellspring-creative-partnership.vercel.app/questionnaire.html" },
      { name: "VO2 Reaction Cardiorespiratory", url: "https://vo-2-reaction-cardiorespiratory-fit.vercel.app/" },
      { name: "VO2 Reaction", url: "https://vo-2-reaction-7r1v.vercel.app/" },
      { name: "VUCA", url: "https://vuca-rho.vercel.app/" },
      { name: "Prime Valley Ranch", url: "https://www.primevalleyranch.com/" },
      { name: "ROI Prime Reaction", url: "https://roi.primereaction.us/" },
      { name: "Prime Facility Vision", url: "https://prime-facility-vision-questionnaire.vercel.app/" },
      { name: "Prime Reaction Tracker", url: "https://prime-reaction-project-tracker.vercel.app/" },
      { name: "Not Fat Free", url: "https://www.notfatfree.com/" },
      { name: "Salesman Toolkit", url: "https://salesman-toolkit.vercel.app/" },
    ];

    const videos = [
      { name: "REAXCORE : COR-X", id: "jk1HvfuEdQg" },
      { name: "REAXTION — Sculpting the Apex Human", id: "Z-oCI4fgXaE" },
      { name: "American Gaucho — Fire, Flavor and Freedom", id: "bRqUW6SlVAo" },
      { name: "Seala Kitchen and Bath", id: "03Y21bR3HAA" },
      { name: "The Gate Is Open — A Pilgrimage Across the Stars", id: "Cl5qBOxF9bA" },
    ];

    const presentations = [
      { name: "Presentations.ai Deck", embedUrl: "https://app.presentations.ai/view/8CQXVcms7d", type: "embed" },
      { name: "Briotix Costco Presentation", id: "BAzL6b1WaDY", type: "youtube" },
      { name: "Briotix PPE Training", id: "CEq9fcqbs8I", type: "youtube" },
    ];

    // Smart grid: calculates width/height so items always fill with no black space
    function smartGrid(container, count, targetCols) {
      const isMobile = window.innerWidth < 640;
      const cols = isMobile ? Math.min(2, targetCols) : targetCols;
      const rows = Math.ceil(count / cols);
      const items = container.querySelectorAll(".bento-item");
      const lastRowItems = count % cols || cols;

      items.forEach((item, i) => {
        const row = Math.floor(i / cols);
        const isLastRow = row === rows - 1;
        const widthPct = isLastRow ? (100 / lastRowItems) : (100 / cols);
        const heightPct = 100 / rows;
        item.style.width = widthPct + "%";
        item.style.height = heightPct + "%";
      });

      // Set container to exact viewport height
      container.style.height = "100vh";
    }

    // ── Web Work ──
    const webGrid = document.getElementById("web-work");
    projects.forEach((p, i) => {
      const item = document.createElement("div");
      item.className = "bento-item";
      item.innerHTML = `
        <div class="bento-tint tint-yellow"></div>
        <div class="bento-label">
          <span class="bento-label-name">${p.name}</span>
          <span class="bento-label-num">${String(i+1).padStart(2,"0")} / ${String(projects.length).padStart(2,"0")}</span>
        </div>
        <div class="bento-click"></div>
      `;
      item.dataset.url = p.url;
      item.dataset.idx = i;
      item.querySelector(".bento-click").addEventListener("click", () => {
        window.open(p.url, "_blank", "noopener,noreferrer");
      });
      webGrid.appendChild(item);
    });

    smartGrid(webGrid, projects.length, 4);

    // Lazy load iframes for web projects
    const webObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          const el = entry.target;
          const idx = parseInt(el.dataset.idx);
          if (!el.querySelector("iframe") && !isNaN(idx)) {
            const iframe = document.createElement("iframe");
            iframe.src = projects[idx].url;
            iframe.title = projects[idx].name;
            iframe.loading = "lazy";
            iframe.setAttribute("tabindex", "-1");
            el.insertBefore(iframe, el.firstChild);
          }
          webObserver.unobserve(el);
        }
      });
    }, { rootMargin: "400px" });

    webGrid.querySelectorAll(".bento-item").forEach(el => webObserver.observe(el));

    // ── Video: 3 cols, some span-2 ──
    const vidGrid = document.getElementById("video-work");
    videos.forEach((v, i) => {
      const item = document.createElement("div");
      item.className = "bento-item interactive";
      const embedUrl = `https://www.youtube.com/embed/${v.id}?rel=0&modestbranding=1`;
      item.innerHTML = `
        <div class="bento-tint tint-orange"></div>
        <div class="bento-label">
          <span class="bento-label-name">${v.name}</span>
          <span class="bento-label-num">${String(i+1).padStart(2,"0")} / ${String(videos.length).padStart(2,"0")}</span>
        </div>
        <iframe src="${embedUrl}" title="${v.name}" loading="lazy"
          allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"
          allowfullscreen style="pointer-events:auto"></iframe>
      `;
      vidGrid.appendChild(item);
    });

    smartGrid(vidGrid, videos.length, 3);

    // ── Presentations: 3 cols ──
    const presGrid = document.getElementById("presentations");
    presentations.forEach((p, i) => {
      const item = document.createElement("div");
      item.className = "bento-item interactive";
      let src;
      if (p.type === "youtube") {
        src = `https://www.youtube.com/embed/${p.id}?rel=0&modestbranding=1`;
      } else {
        src = p.embedUrl;
      }
      item.innerHTML = `
        <div class="bento-tint tint-red"></div>
        <div class="bento-label">
          <span class="bento-label-name">${p.name}</span>
          <span class="bento-label-num">${String(i+1).padStart(2,"0")} / ${String(presentations.length).padStart(2,"0")}</span>
        </div>
        <iframe src="${src}" title="${p.name}" loading="lazy"
          allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"
          allowfullscreen scrolling="no" style="pointer-events:auto"></iframe>
      `;
      presGrid.appendChild(item);
    });

    smartGrid(presGrid, presentations.length, 3);

    // Recalculate on resize
    window.addEventListener("resize", () => {
      smartGrid(webGrid, projects.length, 4);
      smartGrid(vidGrid, videos.length, 3);
      smartGrid(presGrid, presentations.length, 3);
    });

    // ── Randomize tint gradients ──
    const darkPalette = [
      [13,13,13], [17,17,17], [26,26,26], [34,34,34], [22,22,22], [30,30,30], [15,15,15], [20,20,20]
    ];

    function randomGradient() {
      const angle = Math.floor(Math.random() * 360);
      const c1 = darkPalette[Math.floor(Math.random() * darkPalette.length)];
      const c2 = darkPalette[Math.floor(Math.random() * darkPalette.length)];
      const c3 = darkPalette[Math.floor(Math.random() * darkPalette.length)];
      const o = 0.88 + Math.random() * 0.10;
      return `linear-gradient(${angle}deg, rgba(${c1},${o}) 0%, rgba(${c2},${o}) 50%, rgba(${c3},${o}) 100%)`;
    }

    document.querySelectorAll(".bento-tint").forEach(tint => {
      tint.style.background = randomGradient();
    });

    // ── UI Controls ──
    const heroEl = document.getElementById("hero");
    const topMenu = document.getElementById("topMenu");
    const backToTop = document.getElementById("backToTop");

    backToTop.addEventListener("click", () => heroEl.scrollIntoView({ behavior: "smooth" }));

    function updateUI() {
      const pastHero = heroEl.getBoundingClientRect().bottom < 0;
      topMenu.classList.toggle("visible", pastHero);
      backToTop.classList.toggle("visible", pastHero);

      // Active menu link
      const links = topMenu.querySelectorAll(".top-menu-link");
      const sections = ["web-work", "video-work", "presentations"];
      const scrollY = window.scrollY + window.innerHeight / 3;
      let active = null;
      for (let i = sections.length - 1; i >= 0; i--) {
        const el = document.getElementById(sections[i]);
        if (el && el.offsetTop <= scrollY) { active = sections[i]; break; }
      }
      links.forEach(l => l.classList.toggle("active", l.dataset.section === active));

      // Progress
      const docH = document.documentElement.scrollHeight - window.innerHeight;
      document.getElementById("progressBar").style.width = (docH > 0 ? (window.scrollY / docH) * 100 : 0) + "%";
    }

    window.addEventListener("scroll", updateUI, { passive: true });

    // Smooth scroll menu
    topMenu.querySelectorAll(".top-menu-link").forEach(link => {
      link.addEventListener("click", (e) => {
        e.preventDefault();
        document.getElementById(link.dataset.section)?.scrollIntoView({ behavior: "smooth" });
      });
    });

    // Mobile: reveal on scroll
    if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
      const revealObs = new IntersectionObserver((entries) => {
        entries.forEach(e => e.target.classList.toggle("revealed", e.isIntersecting));
      }, { threshold: 0.3 });
      document.querySelectorAll(".bento-item").forEach(el => revealObs.observe(el));
    }

    // Keyboard nav
    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowDown" || e.key === "j") { e.preventDefault(); window.scrollBy({ top: window.innerHeight, behavior: "smooth" }); }
      else if (e.key === "ArrowUp" || e.key === "k") { e.preventDefault(); window.scrollBy({ top: -window.innerHeight, behavior: "smooth" }); }
    });
  </script>
</body>
</html>
