<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matthew Chrestenson — Marketing Proposal Coordinator | MYR Group</title>

  <!-- SEO & Social Share -->
  <meta name="description" content="Portfolio of Matthew Chrestenson, Marketing Proposal Coordinator at MYR Group in Thornton, Colorado. A curated collection of web-based marketing tools, dashboards, and interactive experiences designed to elevate proposal workflows and brand storytelling.">
  <meta name="keywords" content="Matthew Chrestenson, MYR Group, Marketing Proposal Coordinator, Thornton Colorado, web design, marketing tools, dashboards, portfolio 2026">
  <meta name="author" content="Matthew Chrestenson">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Matthew Chrestenson — Current Design Work 2026">
  <meta property="og:description" content="A curated portfolio of web-based marketing tools, dashboards, and interactive experiences by Matthew Chrestenson — Marketing Proposal Coordinator at MYR Group, Thornton, Colorado.">
  <meta property="og:image" content="https://myr-matthew-chrestenson-marketing-p.vercel.app/og-image.svg">
  <meta property="og:url" content="https://myr-matthew-chrestenson-marketing-p.vercel.app">
  <meta property="og:site_name" content="Matthew Chrestenson Portfolio">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Matthew Chrestenson — Current Design Work 2026">
  <meta name="twitter:description" content="A curated portfolio of web-based marketing tools, dashboards, and interactive experiences by Matthew Chrestenson — Marketing Proposal Coordinator at MYR Group.">
  <meta name="twitter:image" content="https://myr-matthew-chrestenson-marketing-p.vercel.app/og-image.svg">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#1a1a1a">

  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

    :root {
      --bg-dark: #111111;
      --bg-mid: #1a1a1a;
      --text-primary: #f0f0f0;
      --text-secondary: #999999;
      --text-dim: #666666;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    html { scroll-behavior: smooth; overflow-x: hidden; }

    body {
      font-family: var(--font);
      background: var(--bg-dark);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* ── Hero ── */
    .hero {
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
      background: linear-gradient(180deg, #0d0d0d 0%, #1a1a1a 50%, #222222 100%);
      position: relative;
    }

    .hero::after {
      content: ''; position: absolute; bottom: 0; left: 50%;
      transform: translateX(-50%); width: 1px; height: 80px;
      background: linear-gradient(180deg, transparent, var(--text-dim));
      animation: pulse-line 2s ease-in-out infinite;
    }

    @keyframes pulse-line { 0%,100%{opacity:.3} 50%{opacity:1} }

    .hero-label {
      font-size: 0.7rem; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--text-dim);
      margin-bottom: 2rem; font-weight: 500;
    }

    .hero h1 {
      font-size: clamp(1.8rem, 5vw, 3.5rem); font-weight: 300;
      letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.5rem;
    }

    .hero h1 strong { font-weight: 600; }

    .hero-year {
      font-size: clamp(1rem, 2.5vw, 1.4rem); font-weight: 200;
      color: var(--text-secondary); margin-bottom: 2.5rem; letter-spacing: 0.1em;
    }

    .hero-meta {
      display: flex; flex-wrap: wrap; gap: 1.5rem;
      justify-content: center; align-items: center;
      font-size: 0.75rem; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--text-dim); font-weight: 400;
    }

    .hero-meta span { display: flex; align-items: center; gap: 0.4rem; }
    .hero-meta .dot { width:3px;height:3px;border-radius:50%;background:var(--text-dim);display:none }
    @media(min-width:640px){.hero-meta .dot{display:block}}

    .scroll-hint {
      position: absolute; bottom: 2rem; font-size: 0.65rem;
      letter-spacing: 0.3em; text-transform: uppercase; color: var(--text-dim);
      animation: fade-bounce 2s ease-in-out infinite;
    }

    @keyframes fade-bounce {
      0%,100%{opacity:.4;transform:translateY(0)} 50%{opacity:1;transform:translateY(4px)}
    }

    /* ── Project Sections ── */
    .project {
      position: relative; width: 100%;
      height: 100vh; height: 100dvh;
      overflow: hidden; cursor: pointer;
    }

    /* Click-capture overlay — sits on top of iframe, blocks interaction */
    .project-overlay {
      position: absolute; inset: 0; z-index: 10;
      background: transparent; transition: background 0.4s ease;
    }

    .project:hover .project-overlay {
      background: rgba(0,0,0,0.12);
    }

    /* Iframe — renders the live site, no interaction */
    .project iframe {
      width: 100%; height: 100%;
      border: none; display: block;
      background: var(--bg-mid);
      pointer-events: none;
    }

    /* Header bar */
    .project-header {
      position: absolute; top: 0; left: 0; right: 0; z-index: 20;
      padding: 1.2rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(180deg, rgba(17,17,17,0.92) 0%, rgba(17,17,17,0.6) 70%, transparent 100%);
      opacity: 0; transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .project:hover .project-header,
    .project.active .project-header { opacity: 1; }
    .project-header * { pointer-events: auto; }

    .project-info { display: flex; align-items: center; gap: 0.8rem; }

    .project-number {
      font-size: 0.65rem; color: var(--text-dim); font-weight: 400;
      letter-spacing: 0.15em; font-variant-numeric: tabular-nums;
    }

    .project-title {
      font-size: 0.7rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--text-secondary); font-weight: 500;
    }

    .project-cta {
      font-size: 0.6rem; color: var(--text-dim); letter-spacing: 0.15em;
      text-transform: uppercase; padding: 0.4rem 0.8rem;
      border: 1px solid rgba(255,255,255,0.12); border-radius: 2px;
      transition: all 0.3s ease; text-decoration: none;
      display: inline-flex; align-items: center; gap: 0.4rem;
    }

    .project-cta:hover {
      color: var(--text-primary); border-color: rgba(255,255,255,0.35);
    }

    /* Fallback card for sites that block iframes */
    .project-card {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(165deg, #141414 0%, #1e1e1e 40%, #191919 100%);
      gap: 1.2rem; z-index: 1;
    }

    .project-card-number {
      font-size: clamp(5rem, 12vw, 9rem); font-weight: 100;
      color: rgba(255,255,255,0.04); line-height: 1;
      letter-spacing: -0.04em;
    }

    .project-card-name {
      font-size: clamp(0.9rem, 2vw, 1.3rem); font-weight: 300;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--text-secondary); text-align: center; padding: 0 2rem;
    }

    .project-card-url {
      font-size: 0.65rem; letter-spacing: 0.08em;
      color: var(--text-dim); font-weight: 300;
    }

    .project-card-btn {
      margin-top: 1rem; font-size: 0.65rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--text-dim);
      border: 1px solid rgba(255,255,255,0.1); padding: 0.6rem 1.5rem;
      border-radius: 2px; transition: all 0.3s ease; cursor: pointer;
      background: none; font-family: var(--font);
    }

    .project-card-btn:hover {
      color: var(--text-primary); border-color: rgba(255,255,255,0.3);
    }

    /* ── Gradient info bar ── */
    .project-bar {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
      height: 56px;
      background: linear-gradient(90deg, #1a1a1a 0%, #2a2a2a 50%, #1a1a1a 100%);
      display: flex; align-items: center; justify-content: center;
      gap: 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .project-bar-number {
      font-size: 0.6rem; color: var(--text-dim); font-weight: 400;
      letter-spacing: 0.15em; font-variant-numeric: tabular-nums;
    }

    .project-bar-divider {
      width: 1px; height: 16px;
      background: rgba(255,255,255,0.1);
    }

    .project-bar-name {
      font-size: 0.75rem; font-weight: 400;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--text-secondary);
    }

    .project-bar-hint {
      font-size: 0.55rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--text-dim);
    }

    /* ── Nav Dots ── */
    .nav-dots {
      position: fixed; right: 1.2rem; top: 50%;
      transform: translateY(-50%); z-index: 100;
      display: flex; flex-direction: column; gap: 0.6rem;
      mix-blend-mode: difference;
    }

    .nav-dot {
      width:6px;height:6px;border-radius:50%;
      background:rgba(255,255,255,0.25);cursor:pointer;
      transition:all .3s ease;border:none;padding:0;
    }

    .nav-dot:hover{background:rgba(255,255,255,0.6);transform:scale(1.4)}
    .nav-dot.active{background:rgba(255,255,255,0.9);transform:scale(1.3)}

    /* ── Progress Bar ── */
    .progress-bar {
      position:fixed;top:0;left:0;height:2px;
      background:linear-gradient(90deg,var(--text-dim),var(--text-primary));
      z-index:200;transition:width .1s linear;width:0%;
    }

    /* ── Mobile ── */
    @media(max-width:639px){
      .hero h1{font-size:1.6rem}
      .hero-meta{flex-direction:column;gap:.6rem}
      .nav-dots{right:.6rem;gap:.5rem}
      .nav-dot{width:5px;height:5px}
      .project-header{padding:.8rem 1rem}
      .project-bar{height:48px;gap:1rem}
      .project-bar-name{font-size:.65rem;letter-spacing:.15em}
    }

    @media(prefers-reduced-motion:reduce){
      html{scroll-behavior:auto}
      .hero::after,.scroll-hint{animation:none}
    }
  </style>
</head>
<body>

  <div class="progress-bar" id="progressBar"></div>
  <nav class="nav-dots" id="navDots" aria-label="Section navigation"></nav>

  <!-- Hero -->
  <section class="hero" id="hero">
    <p class="hero-label">Portfolio</p>
    <h1>Current Design Work</h1>
    <h1><strong>Matthew Chrestenson</strong></h1>
    <p class="hero-year">2026</p>
    <div class="hero-meta">
      <span>Marketing Proposal Coordinator</span>
      <span class="dot"></span>
      <span>MYR Group</span>
      <span class="dot"></span>
      <span>Thornton, Colorado</span>
    </div>
    <p class="scroll-hint">Scroll to explore</p>
  </section>

  <div id="projects"></div>

  <script>
    const projects = [
      { name: "SUPR Tools", url: "https://supr-tools.vercel.app/" },
      { name: "Run Rate", url: "https://run-rate.vercel.app/" },
      { name: "Atlas PCC Dashboard", url: "https://atlas-pcc-api.vercel.app/dashboard" },
      { name: "SUPR Jobsite Supervisor", url: "https://supr-jobsite-supervisor.vercel.app/" },
      { name: "Wellspring Creative Partnership", url: "https://wellspring-creative-partnership.vercel.app/questionnaire.html" },
      { name: "VO2 Reaction Cardiorespiratory", url: "https://vo-2-reaction-cardiorespiratory-fit.vercel.app/" },
      { name: "VO2 Reaction", url: "https://vo-2-reaction-7r1v.vercel.app/" },
      { name: "VUCA", url: "https://vuca-rho.vercel.app/" },
      { name: "DIY Codespring", url: "https://diy-codespring-u2yi.vercel.app/" },
      { name: "ROI Prime Reaction", url: "https://roi.primereaction.us/" },
      { name: "Prime Facility Vision", url: "https://prime-facility-vision-questionnaire.vercel.app/" },
      { name: "Prime Reaction Tracker", url: "https://prime-reaction-project-tracker.vercel.app/" },
      { name: "Not Fat Free", url: "https://www.notfatfree.com/" },
      { name: "Salesman Toolkit", url: "https://salesman-toolkit.vercel.app/" },
    ];

    const total = String(projects.length).padStart(2, "0");
    const container = document.getElementById("projects");
    const navDots = document.getElementById("navDots");

    // Hero dot
    const heroDot = document.createElement("button");
    heroDot.className = "nav-dot active";
    heroDot.setAttribute("aria-label", "Go to top");
    heroDot.addEventListener("click", () => {
      document.getElementById("hero").scrollIntoView({ behavior: "smooth" });
    });
    navDots.appendChild(heroDot);

    // Build sections
    projects.forEach((project, i) => {
      const section = document.createElement("section");
      section.className = "project";
      section.id = `project-${i}`;
      section.innerHTML = `
        <div class="project-overlay"></div>
        <div class="project-header">
          <div class="project-info">
            <span class="project-number">${String(i + 1).padStart(2, "0")} / ${total}</span>
            <span class="project-title">${project.name}</span>
          </div>
          <a class="project-cta" href="${project.url}" target="_blank" rel="noopener noreferrer">
            Visit Site <span>&rarr;</span>
          </a>
        </div>
        <div class="project-bar">
          <span class="project-bar-number">${String(i + 1).padStart(2, "0")} / ${total}</span>
          <span class="project-bar-divider"></span>
          <span class="project-bar-name">${project.name}</span>
          <span class="project-bar-divider"></span>
          <span class="project-bar-hint">Click to open &rarr;</span>
        </div>
      `;

      // Click overlay opens site in new tab
      section.querySelector(".project-overlay").addEventListener("click", () => {
        window.open(project.url, "_blank", "noopener,noreferrer");
      });

      container.appendChild(section);

      // Nav dot
      const dot = document.createElement("button");
      dot.className = "nav-dot";
      dot.setAttribute("aria-label", `Go to ${project.name}`);
      dot.addEventListener("click", () => {
        section.scrollIntoView({ behavior: "smooth" });
      });
      navDots.appendChild(dot);
    });

    // Lazy-load iframes when sections approach viewport
    function attachIframe(section) {
      const idx = parseInt(section.dataset.projectIdx);
      if (isNaN(idx)) return;
      const project = projects[idx];

      // Sites that block iframes get a styled card instead
      if (project.noIframe) {
        if (section.querySelector(".project-card")) return;
        const shortUrl = project.url.replace(/^https?:\/\//, '').replace(/\/$/, '');
        const card = document.createElement("div");
        card.className = "project-card";
        card.innerHTML = `
          <span class="project-card-number">${String(idx + 1).padStart(2, "0")}</span>
          <span class="project-card-name">${project.name}</span>
          <span class="project-card-url">${shortUrl}</span>
          <button class="project-card-btn" onclick="window.open('${project.url}','_blank','noopener,noreferrer')">View Live Site &rarr;</button>
        `;
        section.insertBefore(card, section.firstChild);
        return;
      }

      if (section.querySelector("iframe")) return;
      const iframe = document.createElement("iframe");
      iframe.src = project.url;
      iframe.title = project.name;
      iframe.loading = "lazy";
      iframe.setAttribute("tabindex", "-1");
      iframe.setAttribute("aria-hidden", "true");
      section.insertBefore(iframe, section.firstChild);
    }

    const lazyObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          attachIframe(entry.target);
          lazyObserver.unobserve(entry.target);
        }
      });
    }, { rootMargin: "300px" });

    document.querySelectorAll(".project").forEach((el) => lazyObserver.observe(el));

    // Active section tracking for nav dots
    const heroEl = document.getElementById("hero");

    function updateActiveDot() {
      const viewMid = window.innerHeight / 2;
      const allDots = document.querySelectorAll(".nav-dot");

      // Check hero first
      const heroRect = heroEl.getBoundingClientRect();
      if (heroRect.top <= viewMid && heroRect.bottom > viewMid) {
        allDots.forEach((d, i) => d.classList.toggle("active", i === 0));
        document.querySelectorAll(".project").forEach((p) => p.classList.remove("active"));
        return;
      }

      // Find which project is in view — use the original index for dot mapping
      const visibleProjects = document.querySelectorAll(".project");
      visibleProjects.forEach((p) => p.classList.remove("active"));

      for (const p of visibleProjects) {
        const r = p.getBoundingClientRect();
        if (r.top <= viewMid && r.bottom > viewMid) {
          p.classList.add("active");
          const idx = parseInt(p.dataset.projectIdx);
          // dot 0 = hero, dots 1..N = projects
          allDots.forEach((d, di) => d.classList.toggle("active", di === idx + 1));
          break;
        }
      }
    }

    window.addEventListener("scroll", updateActiveDot, { passive: true });

    // Progress bar — cycles per loop through projects
    window.addEventListener("scroll", () => {
      const scrollTop = window.scrollY;
      const oneLoop = projects.length * window.innerHeight;
      const heroH = heroEl.offsetHeight;
      const inProjects = Math.max(0, scrollTop - heroH);
      const progress = oneLoop > 0 ? ((inProjects % oneLoop) / oneLoop) * 100 : 0;
      document.getElementById("progressBar").style.width = progress + "%";
    }, { passive: true });

    // ── Seamless infinite scroll ──
    // When user nears bottom, clone and append another full set of project sections.
    // Clean up old sections that are far above to keep DOM reasonable.

    let appendCount = 0;
    const MAX_SETS = 6; // max cloned sets in DOM at once

    function buildProjectSection(project, idx) {
      const section = document.createElement("section");
      section.className = "project";
      section.dataset.projectIdx = idx;
      section.innerHTML = `
        <div class="project-overlay"></div>
        <div class="project-header">
          <div class="project-info">
            <span class="project-number">${String(idx + 1).padStart(2, "0")} / ${total}</span>
            <span class="project-title">${project.name}</span>
          </div>
          <a class="project-cta" href="${project.url}" target="_blank" rel="noopener noreferrer">
            Visit Site <span>&rarr;</span>
          </a>
        </div>
        <div class="project-bar">
          <span class="project-bar-number">${String(idx + 1).padStart(2, "0")} / ${total}</span>
          <span class="project-bar-divider"></span>
          <span class="project-bar-name">${project.name}</span>
          <span class="project-bar-divider"></span>
          <span class="project-bar-hint">Click to open &rarr;</span>
        </div>
      `;
      section.querySelector(".project-overlay").addEventListener("click", () => {
        window.open(project.url, "_blank", "noopener,noreferrer");
      });
      return section;
    }

    // Tag original sections with data-project-idx
    document.querySelectorAll(".project").forEach((el, i) => {
      el.dataset.projectIdx = i;
    });

    function appendNextSet() {
      appendCount++;
      const frag = document.createDocumentFragment();
      projects.forEach((project, i) => {
        const section = buildProjectSection(project, i);
        frag.appendChild(section);
      });
      container.appendChild(frag);

      // Observe new sections for lazy iframe loading
      const newSections = container.querySelectorAll(".project:not([data-observed])");
      newSections.forEach((el) => {
        el.dataset.observed = "1";
        lazyObserver.observe(el);
      });
    }

    // Mark originals as observed
    document.querySelectorAll(".project").forEach((el) => { el.dataset.observed = "1"; });

    // Prune old sections that are far above the viewport to keep DOM lean
    function pruneAbove() {
      const allProjects = container.querySelectorAll(".project");
      const totalSections = allProjects.length;
      if (totalSections <= projects.length * 2) return; // keep at least 2 sets

      const cutoff = window.scrollY - window.innerHeight * 3;
      let removed = 0;
      for (const el of allProjects) {
        if (el.offsetTop + el.offsetHeight < cutoff) {
          const h = el.offsetHeight;
          el.remove();
          // Adjust scroll position so user doesn't jump
          window.scrollBy(0, -h);
          removed++;
        } else {
          break; // sections are in order, stop once we hit visible area
        }
        if (removed >= projects.length) break; // prune one set at a time
      }
    }

    // Check on scroll if we need to append more
    window.addEventListener("scroll", () => {
      const scrollBottom = window.scrollY + window.innerHeight;
      const docHeight = document.documentElement.scrollHeight;

      // When within 2 viewports of the bottom, append another set
      if (scrollBottom >= docHeight - window.innerHeight * 2) {
        if (appendCount < MAX_SETS) {
          appendNextSet();
        } else {
          // Hit max sets — prune top and reset counter
          pruneAbove();
          appendCount = Math.max(0, appendCount - 1);
          appendNextSet();
        }
      }
    }, { passive: true });

    // Keyboard navigation
    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowDown" || e.key === "j") {
        e.preventDefault();
        window.scrollBy({ top: window.innerHeight, behavior: "smooth" });
      } else if (e.key === "ArrowUp" || e.key === "k") {
        e.preventDefault();
        window.scrollBy({ top: -window.innerHeight, behavior: "smooth" });
      }
    });
  </script>
</body>
</html>
