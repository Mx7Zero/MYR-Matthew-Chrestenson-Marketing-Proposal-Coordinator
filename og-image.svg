<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#1c1c1c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#2a2a2a" stroke-width="1" opacity="0.35">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- accent bar -->
  <rect x="120" y="120" width="80" height="3" fill="url(#accent)"/>

  <!-- eyebrow -->
  <text x="120" y="160" font-family="-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif" font-size="18" fill="#7dd3fc" letter-spacing="6" font-weight="500">PORTFOLIO · 2026</text>

  <!-- name -->
  <text x="120" y="290" font-family="-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif" font-size="86" fill="#f5f5f5" letter-spacing="-2" font-weight="700">Matthew</text>
  <text x="120" y="380" font-family="-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif" font-size="86" fill="#f5f5f5" letter-spacing="-2" font-weight="700">Chrestenson</text>

  <!-- roles -->
  <text x="120" y="455" font-family="-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif" font-size="22" fill="#c7c7c7" letter-spacing="1" font-weight="400">Business Strategist  ·  Brand Architect  ·  Platform Developer</text>

  <!-- divider -->
  <line x1="120" y1="495" x2="200" y2="495" stroke="#444" stroke-width="1"/>

  <!-- location -->
  <text x="120" y="525" font-family="-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif" font-size="18" fill="#b8b8b8" letter-spacing="4" font-weight="500">DENVER, COLORADO</text>

  <!-- bottom URL -->
  <text x="1080" y="525" font-family="-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif" font-size="16" fill="#7dd3fc" letter-spacing="2" font-weight="500" text-anchor="end">CHRESTENSON.COM</text>

  <!-- right side mark -->
  <g transform="translate(1020,315)">
    <circle r="90" fill="none" stroke="#7dd3fc" stroke-width="2" opacity="0.3"/>
    <circle r="60" fill="none" stroke="#7dd3fc" stroke-width="1.5" opacity="0.5"/>
    <text x="0" y="18" font-family="-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif" font-size="72" fill="#f5f5f5" text-anchor="middle" font-weight="800" letter-spacing="-2">MC</text>
  </g>
</svg>
